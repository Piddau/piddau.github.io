<!DOCTYPE HTML>
<!--
    Warhammer 40,000 Sales Page
    Part of piddau.github.io
-->
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Warhammer 40K Sales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        /* ===================== RESET & BASE ===================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:        #c9a84c;
            --gold-glow:   rgba(201, 168, 76, 0.35);
            --blood-red:   #8b0000;
            --dark-bg:     #08080e;
            --card-bg:     #0f0f18;
            --card-hover:  #141420;
            --border:      #232335;
            --border-gold: #4a3a10;
            --text:        #a0a0b8;
            --light:       #dcdcf0;
            --tag-painted: #1a4a1a;
            --tag-primed:  #3a3a0a;
            --tag-raw:     #2a1a1a;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            line-height: 1.6;
        }

        a { color: var(--gold); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ===================== HEADER ===================== */
        header {
            position: relative;
            text-align: center;
            padding: 4rem 2rem 3rem;
            background: radial-gradient(ellipse at 50% 0%, #1a1005 0%, var(--dark-bg) 70%);
            border-bottom: 1px solid var(--border-gold);
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 60px,
                    rgba(201,168,76,0.03) 60px,
                    rgba(201,168,76,0.03) 61px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 60px,
                    rgba(201,168,76,0.03) 60px,
                    rgba(201,168,76,0.03) 61px
                );
            pointer-events: none;
        }

        .header-eyebrow {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.7;
            margin-bottom: 0.8rem;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 900;
            color: var(--gold);
            text-shadow:
                0 0 30px var(--gold-glow),
                0 0 60px rgba(201,168,76,0.15);
            letter-spacing: 0.12em;
            line-height: 1.1;
            margin-bottom: 0.3rem;
        }

        .header-subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text);
            margin-top: 0.8rem;
        }

        .aquila {
            font-size: 2.5rem;
            color: var(--gold);
            opacity: 0.6;
            margin-bottom: 1rem;
            display: block;
            filter: drop-shadow(0 0 8px var(--gold-glow));
        }

        /* ===================== FILTER BAR ===================== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #555;
            margin-right: 0.5rem;
        }

        .filter-btn {
            padding: 0.35rem 1rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            border-radius: 2px;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .filter-btn.active {
            border-color: var(--gold);
            background: rgba(201,168,76,0.12);
            color: var(--gold);
        }

        .item-count {
            margin-left: auto;
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 0.1em;
        }

        #faction-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* ===================== GRID ===================== */
        .grid-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.5rem;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: #444;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        /* ===================== CARD ===================== */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-gold);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 20px rgba(201,168,76,0.08);
            background: var(--card-hover);
        }

        .card.is-sold {
            opacity: 0.55;
            pointer-events: none;
        }

        /* Card image */
        .card-img-wrap {
            position: relative;
            width: 100%;
            height: 210px;
            overflow: hidden;
            background: #0c0c16;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .card:hover .card-img { transform: scale(1.04); }

        .card-img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #333;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .card-img-placeholder svg {
            width: 48px;
            height: 48px;
            fill: #222;
        }

        .sold-ribbon {
            position: absolute;
            top: 14px;
            right: -24px;
            background: var(--blood-red);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.25rem 2rem;
            transform: rotate(35deg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        /* Card body */
        .card-body {
            padding: 1rem 1.1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }

        .tag {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.15rem 0.55rem;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid;
        }

        .tag-faction  { background: rgba(139,0,0,0.25); border-color: #5a0000; color: #e07070; }
        .tag-painted  { background: rgba(20,80,20,0.35); border-color: #1e5a1e; color: #70c070; }
        .tag-primed   { background: rgba(80,80,20,0.35); border-color: #5a5a1e; color: #c0c060; }
        .tag-unpainted{ background: rgba(50,50,70,0.35); border-color: #38384a; color: #8888aa; }

        .card-name {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--light);
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--text);
            line-height: 1.55;
            flex: 1;
            margin-bottom: 1rem;
        }

        /* Card footer */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            border-top: 1px solid var(--border);
            padding-top: 0.8rem;
            margin-top: auto;
        }

        .price {
            font-family: 'Cinzel', serif;
            font-size: 1.15rem;
            color: var(--gold);
            font-weight: 700;
        }

        .sold-text {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--blood-red);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .buy-btn {
            display: inline-block;
            padding: 0.4rem 1.1rem;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-family: 'Exo 2', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
        }

        .buy-btn:hover {
            background: var(--gold);
            color: #000;
            text-decoration: none;
        }

        /* ===================== CONTACT SECTION ===================== */
        .contact-section {
            max-width: 700px;
            margin: 3rem auto 0;
            padding: 2rem;
            border: 1px solid var(--border-gold);
            background: linear-gradient(135deg, #0f0d07, var(--card-bg));
            border-radius: 3px;
            text-align: center;
        }

        .contact-section h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 0.75rem;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
        }

        .contact-section p {
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            color: var(--text);
        }

        .contact-btn {
            display: inline-block;
            padding: 0.7rem 2rem;
            border: 1px solid var(--gold);
            background: rgba(201,168,76,0.1);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 2px;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
        }

        .contact-btn:hover {
            background: var(--gold);
            color: #000;
            text-decoration: none;
        }

        /* ===================== FOOTER ===================== */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: #3a3a4a;
            letter-spacing: 0.06em;
        }

        footer a { color: #5a5a6a; }
        footer a:hover { color: var(--gold); }

        /* ===================== IMAGE COUNTER BADGE ===================== */
        .img-count-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 0.2rem 0.5rem;
            border-radius: 2px;
            border: 1px solid var(--border-gold);
            pointer-events: none;
        }

        .card-img-wrap { cursor: pointer; }

        /* ===================== LIGHTBOX ===================== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.92);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        .lightbox.open { display: flex; }

        .lightbox-img-wrap {
            position: relative;
            max-width: min(90vw, 900px);
            max-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border: 1px solid var(--border-gold);
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            display: block;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-gold);
            color: var(--gold);
            font-size: 1.4rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s;
            user-select: none;
        }

        .lightbox-nav:hover { background: rgba(201,168,76,0.2); }
        .lightbox-nav.prev  { left: -56px; }
        .lightbox-nav.next  { right: -56px; }
        .lightbox-nav[hidden] { display: none; }

        .lightbox-footer {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .lightbox-counter {
            font-size: 0.8rem;
            color: var(--text);
            letter-spacing: 0.1em;
            min-width: 50px;
            text-align: center;
        }

        .lightbox-dots {
            display: flex;
            gap: 6px;
        }

        .lightbox-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--border);
            border: 1px solid #444;
            cursor: pointer;
            transition: background 0.2s;
        }

        .lightbox-dot.active { background: var(--gold); border-color: var(--gold); }

        .lightbox-close {
            position: fixed;
            top: 1.2rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            padding: 0.2rem 0.5rem;
            transition: color 0.2s;
        }

        .lightbox-close:hover { color: var(--gold); }

        .lightbox-title {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--gold);
            letter-spacing: 0.1em;
        }

        @media (max-width: 600px) {
            .lightbox-nav.prev { left: 4px; }
            .lightbox-nav.next { right: 4px; }
            .lightbox-img-wrap { max-width: 100vw; }
        }

        /* ===================== LOADING / ERROR STATES ===================== */
        .state-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .state-message p {
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            color: #444;
        }

        .state-message.error p { color: var(--blood-red); }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 600px) {
            header { padding: 3rem 1.2rem 2rem; }
            .grid-container { padding: 1rem; }
            .filter-bar { padding: 0.8rem 1rem; }
            .contact-section { margin: 2rem 1rem; }
        }
    </style>
</head>
<body>

<!-- ======= HEADER ======= -->
<header>
    <div class="header-eyebrow">Collection Clearance Sale</div>
    <span class="aquila" title="Aquila">⚜</span>
    <h1>Warhammer 40,000</h1>
    <p class="header-subtitle">Miniatures &amp; Models for Sale</p>
</header>

<!-- ======= FILTER BAR ======= -->
<div class="filter-bar">
    <span class="filter-label">Condition:</span>
    <button class="filter-btn active" data-condition="all">All</button>
    <button class="filter-btn" data-condition="painted">Painted</button>
    <button class="filter-btn" data-condition="primed">Primed</button>
    <button class="filter-btn" data-condition="unpainted">Unpainted</button>
    <span class="item-count" id="item-count"></span>
</div>
<div class="filter-bar" id="faction-bar" style="display:none">
    <span class="filter-label">Faction:</span>
    <div id="faction-btns"></div>
</div>

<!-- ======= PRODUCT GRID ======= -->
<div class="grid-container">
    <div class="grid" id="product-grid"></div>

</div>

<!-- ======= FOOTER ======= -->
<footer>
    <p>&larr; <a href="index.html">Back to Portfolio</a> &nbsp;|&nbsp; All prices exclude shipping &nbsp;|&nbsp; Gothenburg, Sweden</p>
</footer>

<!-- ======= LIGHTBOX ======= -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" id="lb-close" aria-label="Close">&#x2715;</button>
    <div class="lightbox-img-wrap">
        <button class="lightbox-nav prev" id="lb-prev" aria-label="Previous image">&#8249;</button>
        <img class="lightbox-img" id="lb-img" src="" alt="">
        <button class="lightbox-nav next" id="lb-next" aria-label="Next image">&#8250;</button>
    </div>
    <div class="lightbox-footer">
        <span class="lightbox-title" id="lb-title"></span>
        <span class="lightbox-counter" id="lb-counter"></span>
        <div class="lightbox-dots" id="lb-dots"></div>
    </div>
</div>

<!-- ======= DATA & LOGIC ======= -->
<script>
    /* =====================================================
     *  CONFIG — paste your Google Sheets CSV URL here
     *
     *  How to get it:
     *    1. Open your Google Sheet
     *    2. File → Share → Publish to web
     *    3. Choose your sheet tab, select "Comma-separated values (.csv)"
     *    4. Click Publish, copy the URL and paste it below
     *
     *  Expected columns (first row must be a header row):
     *    name | faction | condition | price | description | image | sold
     *
     *  condition values : painted / primed / unpainted
     *  image            : full URL to an image, or leave blank
     *  sold             : TRUE or FALSE
     * ===================================================== */
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_xFzOOd1GZujGJyoHP7xXUqNHDjYGlbkfHo5Hy7q3AdtYF86X0uuETXU-8QfnmFZCk7LwUaEl1wZM/pub?gid=0&single=true&output=csv'; // ← paste URL here

    /* =========================================================
       No edits needed below this line
       ========================================================= */

    const CONDITION_LABELS = { painted: 'Painted', primed: 'Primed', unpainted: 'Unpainted' };

    let ALL_ITEMS = [];
    let activeCondition = 'all';
    let activeFaction   = 'all';

    // ---- CSV parser (handles quoted fields with commas/newlines) ----
    function parseCSV(text) {
        const rows = [];
        let row = [], field = '', inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const ch = text[i], next = text[i + 1];

            if (inQuotes) {
                if (ch === '"' && next === '"') { field += '"'; i++; }
                else if (ch === '"')            { inQuotes = false; }
                else                            { field += ch; }
            } else {
                if      (ch === '"')                        { inQuotes = true; }
                else if (ch === ',')                        { row.push(field.trim()); field = ''; }
                else if (ch === '\n' || (ch === '\r' && next === '\n')) {
                    if (ch === '\r') i++;
                    row.push(field.trim()); field = '';
                    if (row.some(f => f !== '')) rows.push(row);
                    row = [];
                } else { field += ch; }
            }
        }
        // last field/row
        row.push(field.trim());
        if (row.some(f => f !== '')) rows.push(row);

        return rows;
    }

    function csvToItems(rows) {
        if (rows.length < 2) return [];
        const headers = rows[0].map(h => h.toLowerCase().trim());
        const col = name => headers.indexOf(name);

        return rows.slice(1).map((row, i) => {
            const imgRaw = row[col('image')] || '';
            const images = imgRaw.split('|').map(s => s.trim()).filter(Boolean)
                .map(s => /^https?:\/\//i.test(s) ? s : `images/${s}`);
            return {
                id:          i + 1,
                name:        row[col('name')]        || '',
                faction:     row[col('faction')]     || '',
                condition:   (row[col('condition')] || '').toLowerCase(),
                price:       row[col('price')]       || '',
                description: row[col('description')] || '',
                images,
                sold:        (row[col('sold')] || '').toUpperCase() === 'TRUE'
            };
        }).filter(item => item.name);
    }

    // ---- Price formatter ----
    function formatPrice(p) {
        if (!p) return '';
        return /kr|sek/i.test(p) ? p : `${p} kr`;
    }

    // ---- HTML helpers ----
    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function cardImgHtml(item) {
        if (item.images.length > 0) {
            const badge = item.images.length > 1
                ? `<span class="img-count-badge">&#128247; ${item.images.length}</span>`
                : '';
            return `<img class="card-img" src="${escHtml(item.images[0])}" alt="${escHtml(item.name)}" loading="lazy">${badge}`;
        }
        return `
            <div class="card-img-placeholder">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <path d="M32 4L6 18v28l26 14 26-14V18L32 4zm0 4.5l22 11.8V41L32 52.5 10 41V20.3L32 8.5z"/>
                </svg>
                No image yet
            </div>`;
    }

    // ---- Render ----
    function renderGrid() {
        const grid  = document.getElementById('product-grid');
        const count = document.getElementById('item-count');

        const filtered = ALL_ITEMS.filter(i =>
            (activeCondition === 'all' || i.condition === activeCondition) &&
            (activeFaction   === 'all' || i.faction   === activeFaction)
        );

        const available = filtered.filter(i => !i.sold).length;
        count.textContent = `${available} available (${filtered.length} total)`;

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results">No items found for this filter.</div>`;
            return;
        }

        grid.innerHTML = filtered.map(item => `
            <div class="card${item.sold ? ' is-sold' : ''}" data-condition="${escHtml(item.condition)}">
                <div class="card-img-wrap" data-images="${escHtml(item.images.join('|'))}" data-name="${escHtml(item.name)}" onclick="openLightbox(this)">
                    ${cardImgHtml(item)}
                    ${item.sold ? '<div class="sold-ribbon">Sold</div>' : ''}
                </div>
                <div class="card-body">
                    <div class="card-tags">
                        <span class="tag tag-faction">${escHtml(item.faction)}</span>
                        <span class="tag tag-${escHtml(item.condition)}">${escHtml(CONDITION_LABELS[item.condition] || item.condition)}</span>
                    </div>
                    <div class="card-name">${escHtml(item.name)}</div>
                    <div class="card-desc">${escHtml(item.description)}</div>
                    <div class="card-footer">
                        <span class="price">${escHtml(formatPrice(item.price))}</span>
                        ${item.sold ? '<span class="sold-text">Sold</span>' : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function showLoading() {
        document.getElementById('product-grid').innerHTML =
            `<div class="state-message"><div class="spinner"></div><p>Loading listings…</p></div>`;
        document.getElementById('item-count').textContent = '';
    }

    function showError(msg) {
        document.getElementById('product-grid').innerHTML =
            `<div class="state-message error"><p>${escHtml(msg)}</p></div>`;
        document.getElementById('item-count').textContent = '';
    }

    // ---- Fetch & init ----
    async function loadItems() {
        if (!SHEET_CSV_URL) {
            showError('No sheet URL configured yet. Add your Google Sheets CSV URL to SHEET_CSV_URL in the page source.');
            return;
        }

        showLoading();

        try {
            const res = await fetch(SHEET_CSV_URL);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            const rows = parseCSV(text);
            ALL_ITEMS = csvToItems(rows);

            if (ALL_ITEMS.length === 0) {
                showError('Sheet loaded but no items found. Check that the first row is a header row with the correct column names.');
                return;
            }

            buildFactionBar();
            renderGrid();
        } catch (err) {
            showError(`Could not load listings. Make sure the sheet is published as CSV and the URL is correct. (${err.message})`);
        }
    }

    // ---- Faction bar (built after data loads) ----
    function buildFactionBar() {
        const factions = [...new Set(ALL_ITEMS.map(i => i.faction).filter(Boolean))].sort();
        if (factions.length === 0) return;

        const container = document.getElementById('faction-btns');
        container.innerHTML =
            `<button class="filter-btn active" data-faction="all">All</button>` +
            factions.map(f => `<button class="filter-btn" data-faction="${escHtml(f)}">${escHtml(f)}</button>`).join('');

        container.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFaction = btn.dataset.faction;
                renderGrid();
            });
        });

        document.getElementById('faction-bar').style.display = '';
    }

    // Condition filter buttons
    document.querySelectorAll('[data-condition]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-condition]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCondition = btn.dataset.condition;
            renderGrid();
        });
    });

    loadItems();

    /* ===================== LIGHTBOX ===================== */
    const lb        = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbTitle   = document.getElementById('lb-title');
    const lbCounter = document.getElementById('lb-counter');
    const lbDots    = document.getElementById('lb-dots');
    const lbPrev    = document.getElementById('lb-prev');
    const lbNext    = document.getElementById('lb-next');

    let lbImages = [], lbIndex = 0;

    function openLightbox(wrap) {
        const raw = wrap.dataset.images || '';
        lbImages = raw.split('|').filter(Boolean);
        if (lbImages.length === 0) return;
        lbTitle.textContent = wrap.dataset.name || '';
        lbIndex = 0;
        updateLightbox();
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lb.classList.remove('open');
        document.body.style.overflow = '';
    }

    function updateLightbox() {
        lbImg.src = lbImages[lbIndex];
        lbImg.alt = lbTitle.textContent;
        lbCounter.textContent = lbImages.length > 1 ? `${lbIndex + 1} / ${lbImages.length}` : '';
        lbPrev.hidden = lbImages.length <= 1;
        lbNext.hidden = lbImages.length <= 1;

        lbDots.innerHTML = lbImages.length > 1
            ? lbImages.map((_, i) =>
                `<span class="lightbox-dot${i === lbIndex ? ' active' : ''}" onclick="lbGoTo(${i})"></span>`
              ).join('')
            : '';
    }

    function lbGoTo(i) {
        lbIndex = (i + lbImages.length) % lbImages.length;
        updateLightbox();
    }

    lbPrev.addEventListener('click', e => { e.stopPropagation(); lbGoTo(lbIndex - 1); });
    lbNext.addEventListener('click', e => { e.stopPropagation(); lbGoTo(lbIndex + 1); });
    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

    document.addEventListener('keydown', e => {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape')     closeLightbox();
        if (e.key === 'ArrowLeft')  lbGoTo(lbIndex - 1);
        if (e.key === 'ArrowRight') lbGoTo(lbIndex + 1);
    });
</script>

</body>
</html>
